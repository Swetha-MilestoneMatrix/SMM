<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blogs | Swetha R</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;

/* pastel gradient background */

background:linear-gradient(120deg,#fdf2f8,#f0f9ff,#ecfeff);

color:#334155;
overflow-x:hidden;
}

/* network canvas */

#network-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* heading */

.blog-title{
text-align:center;
font-size:42px;
margin-top:60px;
margin-bottom:40px;

/* pastel professional gradient */

background:linear-gradient(90deg,#ec4899,#6366f1,#0ea5e9);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* blog container */

.blog-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
max-width:1100px;
margin:auto;
padding:40px;
}

/* blog cards */

.blog-card{
background:rgba(255,255,255,0.7);
padding:25px;
border-radius:16px;
text-decoration:none;
color:#334155;

border:1px solid rgba(0,0,0,0.05);

backdrop-filter:blur(6px);

transition:0.3s;
}

.blog-card:hover{
transform:translateY(-8px);
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.blog-card h2{
color:#6366f1;
margin-top:0;
}

</style>

</head>

<body>

<canvas id="network-bg"></canvas>

<h1 class="blog-title">Network Insights & Personal Blogs</h1>

<div class="blog-container">

<a href="./my-journey.html" class="blog-card">
<h2>My Journey in Networking</h2>
<p>A personal introduction about my networking career and experiences.</p>
</a>

</div>

<script>

const canvas = document.getElementById("network-bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let nodes = [];
let packets = [];

/* create nodes */

for(let i=0;i<35;i++){
nodes.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height
});
}

/* create packets */

for(let i=0;i<15;i++){
packets.push({
from:Math.floor(Math.random()*nodes.length),
to:Math.floor(Math.random()*nodes.length),
progress:Math.random()
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* connections */

for(let i=0;i<nodes.length;i++){

for(let j=i+1;j<nodes.length;j++){

let dist=Math.hypot(nodes[i].x-nodes[j].x,nodes[i].y-nodes[j].y);

if(dist<220){

ctx.beginPath();
ctx.moveTo(nodes[i].x,nodes[i].y);
ctx.lineTo(nodes[j].x,nodes[j].y);

/* pastel connection color */

ctx.strokeStyle="rgba(99,102,241,0.15)";
ctx.stroke();

}

}

}

/* nodes */

nodes.forEach(n=>{
ctx.beginPath();
ctx.arc(n.x,n.y,3,0,Math.PI*2);
ctx.fillStyle="#a5b4fc";
ctx.fill();
});

/* packets */

packets.forEach(p=>{

let start=nodes[p.from];
let end=nodes[p.to];

p.progress+=0.008;

if(p.progress>=1){
p.from=Math.floor(Math.random()*nodes.length);
p.to=Math.floor(Math.random()*nodes.length);
p.progress=0;
}

let x=start.x+(end.x-start.x)*p.progress;
let y=start.y+(end.y-start.y)*p.progress;

ctx.beginPath();
ctx.arc(x,y,2,0,Math.PI*2);

/* soft pastel packet */

ctx.fillStyle="#f472b6";
ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>

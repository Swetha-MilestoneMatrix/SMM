<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blogs | Swetha R</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#020617;
color:white;
overflow-x:hidden;
}

/* Background canvas */

#network-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* Heading */

.blog-title{
text-align:center;
font-size:42px;
margin-top:60px;
margin-bottom:40px;

background:linear-gradient(90deg,#38bdf8,#60a5fa,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Blog layout */

.blog-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
max-width:1100px;
margin:auto;
padding:40px;
}

/* Blog cards */

.blog-card{
background:rgba(255,255,255,0.04);
padding:25px;
border-radius:14px;
text-decoration:none;
color:white;
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
backdrop-filter:blur(8px);
}

.blog-card:hover{
transform:translateY(-10px);
border-color:#38bdf8;
box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

.blog-card h2{
color:#38bdf8;
margin-top:0;
}

</style>

</head>

<body>

<canvas id="network-bg"></canvas>

<h1 class="blog-title">Network Insights & Personal Blogs</h1>

<div class="blog-container">

<a href="./my-journey.html" class="blog-card">
<h2>My Journey in Networking</h2>
<p>A personal introduction about my networking career and experiences.</p>
</a>

</div>

<script>

const canvas = document.getElementById("network-bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let nodes = [];
let packets = [];

/* Create nodes */

for(let i=0;i<30;i++){

nodes.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height
});

}

/* Create packets */

for(let i=0;i<20;i++){

packets.push({
from:Math.floor(Math.random()*nodes.length),
to:Math.floor(Math.random()*nodes.length),
progress:Math.random()
});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* Draw connections */

for(let i=0;i<nodes.length;i++){

for(let j=i+1;j<nodes.length;j++){

let dist = Math.hypot(nodes[i].x-nodes[j].x,nodes[i].y-nodes[j].y);

if(dist<250){

ctx.beginPath();
ctx.moveTo(nodes[i].x,nodes[i].y);
ctx.lineTo(nodes[j].x,nodes[j].y);
ctx.strokeStyle="rgba(56,189,248,0.08)";
ctx.stroke();

}

}

}

/* Draw nodes */

nodes.forEach(n=>{

ctx.beginPath();
ctx.arc(n.x,n.y,3,0,Math.PI*2);
ctx.fillStyle="#38bdf8";
ctx.fill();

});

/* Animate packets */

packets.forEach(p=>{

let start = nodes[p.from];
let end = nodes[p.to];

p.progress += 0.01;

if(p.progress>=1){

p.from = Math.floor(Math.random()*nodes.length);
p.to = Math.floor(Math.random()*nodes.length);
p.progress = 0;

}

let x = start.x + (end.x-start.x)*p.progress;
let y = start.y + (end.y-start.y)*p.progress;

ctx.beginPath();
ctx.arc(x,y,2,0,Math.PI*2);
ctx.fillStyle="#22c55e";
ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
